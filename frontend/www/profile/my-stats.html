<!DOCTYPE html>
<html lang="en">

<head>
    <title>My Stats</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Sen:wght@400;700&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="manifest" href="../favicon/site.webmanifest">

    <link rel="stylesheet" href="../css/my-stats.css">
</head>

<body>
    <header>
        <h1>My Stats</h1>
    </header>

    <main>
        <section id="title-box">
            <h2>Personal Records</h2>

            <div id="ribbon-box">
                <img id="ribbon" src="../img/stats-ribbon.svg" alt="Blue/gold ribbon">
            </div>
        </section>

        <section id="pr-box">
            <div class="pr-category">
                <span class="distance">1,600 m:</span><span class="result">0:00</span>
            </div>

            <hr>

            <div class="pr-category">
                <span class="distance">5K:</span><span class="result">0:00</span>
            </div>

            <hr>

            <div class="pr-category">
                <span class="distance">10K:</span><span class="result">0:00</span>
            </div>
        </section>

        <section id="totals-box">
            <div>
                <div class="totals-category">
                    <span class="black">Races completed:</span><span class="white">0</span>
                </div>

                <br>

                <div class="totals-category">
                    <span class="black">Total miles ran:</span><span class="white">0</span>
                </div>

                <br>

                <div class="totals-category">
                    <span class="black">Average mile time:</span><span class="white">0:00</span>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <button id="races-button">
            <img src="../img/logo.webp" alt="Logo">
        </button>

        <button id="home-button">
            <img src="../img/home-icon.png" alt="Home icon">
        </button>

        <button id="people-button">
            <img src="../img/people-icon.png" alt="People icon">
        </button>
    </footer>

    <script src="../js/my-stats.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <title>My Profile</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Sen:wght@400;700&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="manifest" href="../favicon/site.webmanifest">

    <link rel="stylesheet" href="../css/profile.css">
</head>

<body>
    <header>
        <div id="header-spacer"></div>

        <h1>My Profile</h1>

        <button id="edit-button">Edit</button>
    </header>

    <main>
        <section id="profile-picture">
            <div id="picture"></div>
        </section>

        <section id="profile-info">
            <form action="/run">
                <div class="info">
                    <label for="first-name">First name:</label>
                    <input type="text" placeholder="Robert" readonly>
                </div>

                <div class="info">
                    <label for="last-name">Last name:</label>
                    <input type="text" placeholder="Bulai" readonly>
                </div>

                <div class="info">
                    <label for="gender">Gender:</label>
                    <select>
                        <option value=""></option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="info">
                    <span id="dob">Date of birth: </span><span>08/09/1998</span>
                </div>

                <div class="info">
                    <label for="phone-number">Phone number:</label>
                    <input type="text" placeholder="773-387-9250" readonly>
                </div>

                <div class="info">
                    <label for="email">Email address:</label>
                    <input type="text" placeholder="rbulai@luc.edu" readonly>
                </div>

                <div class="info">
                    <label for="password">Password:</label>
                    <input type="password" placeholder="********" readonly>
                </div>

                <div class="info">
                    <label for="address-1">Address 1:</label>
                    <input type="text" placeholder="535 Michigan Ave" readonly>
                </div>

                <div class="info">
                    <label for="address-2">Address 2:</label>
                    <input type="text" placeholder="APT 2W" readonly>
                </div>

                <div class="info">
                    <label for="city">City:</label>
                    <input type="text" placeholder="Evanston" readonly>
                </div>

                <div class="info">
                    <label for="state">State:</label>
                    <select>
                        <option value=""></option>
                        <option value="IL">IL</option>
                    </select>
                </div>

                <div class="info">
                    <label for="zip">ZIP:</label>
                    <input type="text" placeholder="60202" readonly>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <button id="races-button">
            <img src="../img/logo.webp" alt="Logo">
        </button>

        <button id="home-button">
            <img src="../img/home-icon.png" alt="Home icon">
        </button>

        <button id="people-button">
            <img src="../img/people-icon.png" alt="People icon">
        </button>
    </footer>

    <script src="../js/profile.js"></script>
</body>

</html>
